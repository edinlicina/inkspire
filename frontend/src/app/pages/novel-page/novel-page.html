@let _novel=novel|async;

<!--  -->
@if(_novel === undefined || _novel === null){
<p>Novel not found</p>
}@else {
<div class="titleDescDiv">
<p class="title">{{_novel.title}}</p>
<p>{{_novel.description}}</p>
</div>
<button type="button" class="button" (click)="deleteNovel(_novel.id)">Delete Button</button>
}
